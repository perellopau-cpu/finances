#config-banner { background: #fff3cd; border-bottom: 1px solid #ffc107; padding: 10px 20px; font-size: 13px; color: #856404; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
#config-banner input { flex: 1; min-width: 200px; padding: 6px 10px; border: 1px solid #ffc107; border-radius: 6px; font-size: 16px; background: white; }
#config-banner button { background: #ffc107; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: #1a1a1a; white-space: nowrap; }
#config-banner.hidden { display: none; }

header { background: white; border-bottom: 1px solid #e5e5e5; padding: 0 20px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 0; }
h1 { font-size: 18px; font-weight: 600; }
.header-btns { display: flex; gap: 6px; }
.sync-btn { background: none; border: 1px solid #e5e5e5; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #666; }
.sync-btn:hover { background: #f5f5f5; }
.sync-btn:disabled { opacity: 0.5; pointer-events: none; }
.cfg-btn { background: none; border: 1px solid #e5e5e5; padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 16px; color: #666; }
.cfg-btn:hover { background: #f5f5f5; }

.month-nav { display: flex; align-items: center; gap: 10px; padding: 10px 0; flex-wrap: wrap; }
.month-nav select { font-size: 14px; padding: 6px 10px; border: 1px solid #e0e0e0; border-radius: 8px; background: white; color: #1a1a1a; cursor: pointer; font-size: 16px; }
.month-nav .nav-summary-btn { padding: 6px 14px; font-size: 13px; cursor: pointer; border: 1px solid #e0e0e0; border-radius: 8px; background: white; color: #666; transition: all 0.15s; }
.month-nav .nav-summary-btn:hover, .month-nav .nav-summary-btn.active { background: #2563eb; color: white; border-color: #2563eb; }

main { max-width: 960px; margin: 0 auto; padding: 20px 16px; }
#loader { text-align: center; padding: 60px 20px; color: #888; }
.spinner { width: 32px; height: 32px; border: 3px solid #e5e5e5; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }

.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.metric { background: white; border-radius: 10px; padding: 14px 12px; border: 1px solid #e5e5e5; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 6px; }
.metric-value { font-size: 18px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
@media (max-width: 400px) { .metric-value { font-size: 15px; } }
.green { color: #16a34a; } .red { color: #dc2626; } .blue { color: #2563eb; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
@media (max-width: 700px) { .two-col { grid-template-columns: 1fr; } .metric-grid { gap: 8px; } }
.panel { background: white; border-radius: 10px; border: 1px solid #e5e5e5; padding: 16px; }
.panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.panel-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }

table { width: 100%; font-size: 13px; border-collapse: collapse; }
th { text-align: left; color: #888; font-weight: 400; padding: 6px 8px; border-bottom: 1px solid #f0f0f0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
td { padding: 7px 8px; border-bottom: 1px solid #f5f5f5; vertical-align: top; }
tr:last-child td { border-bottom: none; }
td.amount { text-align: right; font-weight: 600; font-size: 13px; white-space: nowrap; vertical-align: middle; }
td.ref-col { color: #1a1a1a; font-size: 12px; max-width: 160px; }
.ref-text { display: block; color: #1a1a1a; }
.ref-date { display: block; font-size: 11px; color: #bbb; margin-top: 2px; }
.cat-pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; vertical-align: middle; }
.del-btn { background: none; border: none; color: #ddd; cursor: pointer; font-size: 13px; padding: 0 4px; transition: color 0.1s; }
tr:hover .del-btn { color: #bbb; }
.del-btn:hover { color: #dc2626 !important; }

.add-btn { background: none; border: 1px solid #e5e5e5; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #444; }
.add-btn:hover { background: #f9f9f9; }
.detail-btn { background: none; border: 1px solid #e5e5e5; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #666; white-space: nowrap; }
.detail-btn:hover { background: #f5f5f5; }

.form-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
.form-row select, .form-row input { flex: 1; min-width: 90px; font-size: 16px; padding: 7px 10px; border: 1px solid #e0e0e0; border-radius: 8px; background: white; color: #1a1a1a; }
.save-btn { background: #2563eb; color: white; border: none; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; }
.save-btn:hover { background: #1d4ed8; }
.save-btn:disabled { opacity: 0.5; pointer-events: none; }
.cancel-btn { background: none; border: 1px solid #e0e0e0; color: #888; padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
.hidden { display: none; }

.bar-chart-outer { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.bar-chart-inner { height: 250px; }
.chart-wrap { position: relative; width: 100%; height: 210px; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.hidden { display: none; }
.modal { background: white; border-radius: 14px; width: 100%; max-width: 440px; max-height: 85vh; display: flex; flex-direction: column; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; border-radius: 14px 14px 0 0; }
.modal-header h3 { font-size: 15px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; padding: 2px 6px; border-radius: 6px; line-height: 1; }
.modal-close:hover { background: #f5f5f5; color: #1a1a1a; }
.modal-body { padding: 8px 20px 20px; overflow-y: auto; flex: 1; }
.modal-back { background: none; border: none; color: #2563eb; font-size: 13px; cursor: pointer; padding: 8px 0 4px; display: flex; align-items: center; gap: 4px; }

.cat-detail-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid #f5f5f5; cursor: pointer; border-radius: 6px; }
.cat-detail-row:hover { background: #f9f9f9; }
.cat-detail-row:last-of-type { border-bottom: none; }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cat-detail-name { flex: 1; font-size: 13px; }
.cat-detail-meta { font-size: 11px; color: #aaa; margin-right: 4px; white-space: nowrap; }
.cat-detail-amount { font-size: 14px; font-weight: 600; white-space: nowrap; }
.cat-detail-arrow { color: #ccc; font-size: 13px; flex-shrink: 0; }
.modal-total { display: flex; justify-content: space-between; padding: 12px 0 4px; border-top: 1px solid #e5e5e5; margin-top: 4px; font-weight: 600; font-size: 14px; }

.payment-row { padding: 10px 0; border-bottom: 1px solid #f5f5f5; }

.payment-amount { font-size: 14px; font-weight: 600; white-space: nowrap; }
.payment-date { font-size: 11px; color: #bbb; margin-top: 3px; }

.cfg-edit-form input[type="color"] { width: 36px; height: 32px; padding: 2px 3px; border: 1px solid #e0e0e0; border-radius: 6px; cursor: pointer; }

.lang-selector { display: flex; gap: 8px; margin-bottom: 20px; }
.lang-btn { flex: 1; padding: 8px; border: 1px solid #e5e5e5; border-radius: 8px; background: white; cursor: pointer; font-size: 14px; color: #666; transition: all 0.15s; }
.lang-btn:hover { background: #f5f5f5; }
.lang-btn.active { border-color: #2563eb; color: #2563eb; font-weight: 600; background: #eff6ff; }

.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f5f5f5;}
.toggle-label{font-size:13px;color:#1a1a1a;}
.toggle-sub{font-size:11px;color:#aaa;margin-top:2px;}
.toggle-switch{position:relative;width:44px;height:26px;flex-shrink:0;}
.toggle-switch input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#e0e0e0;border-radius:26px;cursor:pointer;transition:0.2s;}
.toggle-slider:before{content:"";position:absolute;width:20px;height:20px;left:3px;bottom:3px;background:white;border-radius:50%;transition:0.2s;}
input:checked+.toggle-slider{background:#2563eb;}
input:checked+.toggle-slider:before{transform:translateX(18px);}

#toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: white; padding: 10px 18px; border-radius: 10px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; max-width: 280px; }
#toast.show { opacity: 1; }
#toast.error { background: #dc2626; }

// ---- CATEGORY TRANSLATION MAP ----
// Maps category names across all 3 languages: [ca, es, en]
const CAT_TRANS = [
  ['Supermercat','Supermercado','Supermarket'],
  ['Restaurant','Restaurante','Restaurant'],
  ['Alcohol','Alcohol','Alcohol'],
  ['Transport','Transporte','Transport'],
  ['Salut i esport','Salud y deporte','Health & sport'],
  ['Roba o accesoris','Ropa o accesorios','Clothes & accessories'],
  ['Subscripcions','Suscripciones','Subscriptions'],
  ['Farmàcia','Farmacia','Pharmacy'],
  ['Allotjament','Alojamiento','Accommodation'],
  ['Entrades','Entradas','Tickets'],
  ['Impostos','Impuestos','Taxes'],
  ['Formació','Formación','Education'],
  ['Perruqueria','Peluquería','Haircut'],
  ['Tabac','Tabaco','Tobacco'],
  ['Altres','Otros','Others'],
];
const ING_TRANS = [
  ['Worldpackers','Worldpackers','Worldpackers'],
  ['Família','Familia','Family'],
  ['Atur','Paro','Unemployment'],
  ['UGC','UGC','UGC'],
  ['YouTube','YouTube','YouTube'],
  ['Altres','Otros','Others'],
];
const LANG_IDX = {ca:0, es:1, en:2};

function translateCat(catName, fromLang, toLang) {
  if (fromLang === toLang) return catName;
  const fromIdx = LANG_IDX[fromLang];
  const toIdx = LANG_IDX[toLang];
  // Check despeses
  for (const row of CAT_TRANS) {
    if (row[fromIdx] === catName) return row[toIdx];
  }
  // Check ingressos
  for (const row of ING_TRANS) {
    if (row[fromIdx] === catName) return row[toIdx];
  }
  return catName; // untranslated, keep original
}

function translateColorMap(colorMap, fromLang, toLang) {
  if (fromLang === toLang) return colorMap;
  const newMap = {};
  Object.entries(colorMap).forEach(([cat, color]) => {
    const translated = translateCat(cat, fromLang, toLang);
    newMap[translated] = color;
  });
  return newMap;
}

function translateAllData(fromLang, toLang) {
  if (fromLang === toLang) return;
  ALL_MONTHS.forEach(m => {
    if (!appData[m]) return;
    appData[m].desp.forEach(r => { r.cat = translateCat(r.cat, fromLang, toLang); });
    appData[m].ing.forEach(r => { r.cat = translateCat(r.cat, fromLang, toLang); });
  });
}

function t(key, vars) {
  let s = T[key] || key;
  if (vars) Object.entries(vars).forEach(([k,v]) => { s = s.replace('{{'+k+'}}', v); });
  return s;
}

function fmt(n) { return (parseFloat(n)||0).toFixed(2)+'€'; }
function fmtSign(n,isDesp) { return (isDesp?'-':'+')+fmt(n); }
function sum(arr) { return (arr||[]).reduce((a,b)=>a+(parseFloat(b.amount)||0),0); }
function getByCat(arr) {
  const m={};
  (arr||[]).forEach(r=>{m[r.cat]=(m[r.cat]||0)+r.amount;});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function getCountByCat(arr) {
  const m={};
  (arr||[]).forEach(r=>{
    if(!m[r.cat])m[r.cat]={total:0,count:0,items:[]};
    m[r.cat].total+=r.amount;m[r.cat].count++;m[r.cat].items.push(r);
  });
  return Object.entries(m).sort((a,b)=>b[1].total-a[1].total);
}
function collectAllForType(months,type) {
  const all=[];
  months.forEach(m=>(appData[m]&&appData[m][type]||[]).forEach(r=>all.push(r)));
  return all;
}
function destroyCharts(){Object.values(charts).forEach(c=>c.destroy());charts={};}
function toggleForm(id){document.getElementById(id).classList.toggle('hidden');}
function todayStr(){
  const d=new Date();
  return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();
}

function normalizeDate(raw) {
  if (!raw) return '';
  // Already in DD/MM/YYYY format
  if (typeof raw === 'string' && /^\d{1,2}\/\d{1,2}\/\d{4}$/.test(raw)) return raw;
  // Try parsing as a date object or string
  const d = new Date(raw);
  if (!isNaN(d.getTime())) {
    return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();
  }
  // Return first 10 chars as fallback
  return String(raw).substring(0,10);
}

function buildNav() {
  const container = document.getElementById('month-nav');
  if (!container) return;
  const currentYear = new Date().getFullYear();
  const years = [];
  for (let y = currentYear - 2; y <= currentYear + 2; y++) years.push(y);
  const yearOpts = years.map(y => '<option value="'+y+'"'+(y===activeYear?' selected':'')+'>'+y+'</option>').join('');
  const monthOpts = T.months.map(function(m,i) {
    const key = MONTH_KEYS[i]+activeYear;
    return '<option value="'+key+'"'+(activeTab===key?' selected':'')+'>'+m+'</option>';
  }).join('');
  container.innerHTML =
    '<button class="nav-summary-btn'+(activeTab==='Resum'?' active':'')+'" onclick="setTab(\'Resum\')">'+T.tabSummary+'</button>'+
    '<select id="year-sel" style="font-size:16px" onchange="setYear(parseInt(this.value))">'+yearOpts+'</select>'+
    '<select id="month-sel" style="font-size:16px" onchange="setTab(this.value)">'+monthOpts+'</select>';
}

function setYear(year) {
  activeYear = year;
  getMonthsForYear(year).forEach(function(m){ if(!appData[m]) appData[m]={ing:[],desp:[],inv:[]}; });
  activeTab = MONTH_KEYS[new Date().getMonth()]+year;
  buildNav();
  render();
}

function setTab(tab) {
  activeTab = tab;
  if (tab !== 'Resum') {
    // extract year from tab key e.g. 'Abril2026' -> 2026
    const yr = parseInt(tab.replace(/[^0-9]/g,''));
    if (yr && yr !== activeYear) {
      activeYear = yr;
      getMonthsForYear(yr).forEach(function(m){ if(!appData[m]) appData[m]={ing:[],desp:[],inv:[]}; });
    }
  }
  buildNav();
  render();
}

async function api(params) {
  const url = SCRIPT_URL+'?'+new URLSearchParams(params).toString();
  const res = await fetch(url);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

async function loadAll() {
  if (!SCRIPT_URL) return;
  const btn = document.getElementById('sync-btn');
  btn.disabled = true; btn.textContent = T.syncing;
  try {
    const [cats, data] = await Promise.all([
      api({action:'getCategories'}),
      api({action:'getData'})
    ]);
    if (cats.desp) { try { const c=JSON.parse(cats.desp); CAT_COLORS=translateColorMap(c,'ca',currentLang); } catch(e){} }
    if (cats.ing)  { try { const c=JSON.parse(cats.ing);  ING_COLORS=translateColorMap(c,'ca',currentLang);  } catch(e){} }
    appData={};
    // init all years we might have data for
    ALL_MONTHS.forEach(m=>{appData[m]={ing:[],desp:[],inv:[]};});
    getMonthsForYear(activeYear).forEach(m=>{if(!appData[m])appData[m]={ing:[],desp:[],inv:[]};});
    Object.keys(data).forEach(m=>{
      if(!appData[m])appData[m]={ing:[],desp:[],inv:[]};
      (data[m].ing||[]).forEach(r=>appData[m].ing.push({...r, date:normalizeDate(r.date)}));
      (data[m].desp||[]).forEach(r=>appData[m].desp.push({...r, date:normalizeDate(r.date)}));
      (data[m].inv||[]).forEach(r=>{
        const p=(r.ref||'').split('|');
        appData[m].inv.push({cat:r.cat,amount:r.amount,opType:p[0]==='sell'?'sell':'buy',ref:p.slice(1).join('|'),date:normalizeDate(r.date)});
      });
    });
    if (currentLang !== 'ca') translateAllData('ca', currentLang);
    render();
    showToast(T.synced);
  } catch(err) {
    showToast(T.errorDeleting+err.message, true);
    if (Object.keys(appData).length===0) {
      getMonthsForYear(activeYear).forEach(m => { if(!appData[m]) appData[m]={ing:[],desp:[],inv:[]}; });
      render();
    }
  } finally {
    btn.disabled=false; btn.textContent=T.sync;
  }
}

async function addEntry(sheet, type) {
  const cat = document.getElementById(type+'-cat').value;
  const amt = parseFloat(document.getElementById(type+'-amt').value);
  const ref = document.getElementById(type+'-ref').value;
  const btn = document.getElementById(type+'-save-btn');
  if (!amt||isNaN(amt)||amt<=0) { showToast(T.invalidAmount, true); return; }
  btn.disabled=true; btn.textContent=T.save;
  const date = todayStr();
  try {
    const catCA = translateCat(cat, currentLang, 'ca'); // always save in CA to Sheets
    await api({action:'addEntry', sheet, type, cat:catCA, amount:amt, ref, date});
    appData[sheet][type].push({cat, amount:amt, ref, date}); // keep in current lang locally
    document.getElementById(type+'-amt').value='';
    document.getElementById(type+'-ref').value='';
    render();
    showToast(T.added);
  } catch(err) {
    showToast(T.errorSaving+err.message, true);
  } finally {
    btn.disabled=false; btn.textContent=T.save;
  }
}

async function deleteEntry(sheet, type, idx) {
  if (!confirm(T.confirmDeleteEntry)) return;
  try {
    await api({action:'deleteEntry', sheet, type, index:idx});
    appData[sheet][type].splice(idx,1);
    render();
    showToast(T.deleted);
  } catch(err) {
    showToast(T.errorDeleting+err.message, true);
  }
}

function showCatDetail(type, months) {
  modalState = {type, months};
  const isDesp = type==='desp';
  const colorMap = isDesp?CAT_COLORS:ING_COLORS;
  const allEntries = collectAllForType(months, type);
  const cats = getCountByCat(allEntries);
  const grandTotal = cats.reduce((s,e)=>s+e[1].total, 0);

  let rows = '';
  cats.forEach(entry => {
    const cat=entry[0]; const v=entry[1];
    const color=colorMap[cat]||'#888';
    const pct=grandTotal>0?(v.total/grandTotal*100).toFixed(1):0;
    rows += '<div class="cat-detail-row" onclick="showCatPayments(\''+cat.replace(/'/g,"\\'")+'\')">'+
      '<div class="cat-dot" style="background:'+color+'"></div>'+
      '<div class="cat-detail-name">'+cat+'</div>'+
      '<div class="cat-detail-meta">'+v.count+' '+T.reg+' &middot; '+pct+'%</div>'+
      '<div class="cat-detail-amount" style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(v.total,isDesp)+'</div>'+
      '<div class="cat-detail-arrow">&#8250;</div>'+
    '</div>';
  });

  const totalRow = rows?'<div class="modal-total"><span>'+T.total+'</span><span style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(grandTotal,isDesp)+'</span></div>':'';
  document.getElementById('modal-title').textContent = isDesp?T.despByCat:T.ingByCat;
  document.getElementById('modal-body').innerHTML = rows?rows+totalRow:'<p style="color:#aaa;font-size:13px;padding:8px 0">'+T.noData+'</p>';
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function closeModalDirect(){document.getElementById('modal-overlay').classList.add('hidden');modalState=null;}

// ---- RENDER ----
function render() {
  destroyCharts();
  document.getElementById('main').innerHTML = activeTab==='Resum'?renderResume():renderMonth(activeTab);
  requestAnimationFrame(()=>{
    if (activeTab!=='Resum') { bindInvButtons(activeTab); }
    if (activeTab==='Resum') {
      const yearMonths = getMonthsForYear(activeYear);
      initBarChart();
      initPieChart('pieDesp', getByCat(collectAllForType(yearMonths,'desp')), CAT_COLORS);
      initPieChart('pieIng', getByCat(collectAllForType(yearMonths,'ing')), ING_COLORS);
    } else {
      const d=appData[activeTab]||{ing:[],desp:[],inv:[]};
      if(d.desp.length)initPieChart('pieMonthDesp',getByCat(d.desp),CAT_COLORS);
      if(d.ing.length)initPieChart('pieMonthIng',getByCat(d.ing),ING_COLORS);
    }
  });
}

function renderResume() {
  const md = getMonthsForYear(activeYear).map((m,i)=>({label:T.months[i],ing:sum(appData[m]&&appData[m].ing),desp:sum(appData[m]&&appData[m].desp),inv:(appData[m]?.inv||[]).reduce((a,r)=>a+(r.opType==='sell'?-r.amount:r.amount),0)}));
  const months = getMonthsForYear(activeYear);
  const totalIng=md.reduce((a,b)=>a+b.ing,0);
  const totalDesp=md.reduce((a,b)=>a+b.desp,0);
  const balance=totalIng-totalDesp;
  const rows=md.filter(m=>m.ing>0||m.desp>0||m.inv!==0).map(m=>{
    const bal=m.ing-m.desp;
    const nb=bal-m.inv;
    return investEnabled?
      '<tr><td style="font-weight:500">'+m.label+'</td>'+
        '<td class="amount green">+'+fmt(m.ing)+'</td>'+
        '<td class="amount red">-'+fmt(m.desp)+'</td>'+
        '<td class="amount" style="color:#0f6e56">'+fmt(m.inv)+'</td>'+
        '<td class="amount '+(nb>=0?'blue':'red')+'">'+(nb>=0?'+':'')+fmt(nb)+'</td></tr>':
      '<tr><td style="font-weight:500">'+m.label+'</td>'+
        '<td class="amount green">+'+fmt(m.ing)+'</td>'+
        '<td class="amount red">-'+fmt(m.desp)+'</td>'+
        '<td class="amount '+(bal>=0?'blue':'red')+'">'+(bal>=0?'+':'')+fmt(bal)+'</td></tr>';
  }).join('');

  const tInvNet=investEnabled?months.reduce((a,m)=>a+(appData[m]?.inv||[]).reduce((b,r)=>b+(r.opType==='sell'?-r.amount:r.amount),0),0):0; // months = full year
  const netBal2=balance-tInvNet;
  return (investEnabled?
    '<div class="metric-grid" style="grid-template-columns:repeat(4,1fr)">'+
      '<div class="metric"><div class="metric-label">'+T.totalIncome+'</div><div class="metric-value green">+'+fmt(totalIng)+'</div></div>'+
      '<div class="metric"><div class="metric-label">'+T.totalExpenses+'</div><div class="metric-value red">-'+fmt(totalDesp)+'</div></div>'+
      '<div class="metric"><div class="metric-label">'+T.totalInvested+'</div><div class="metric-value" style="color:#0f6e56">'+fmt(tInvNet)+'</div></div>'+
      '<div class="metric"><div class="metric-label">'+T.netBalance+'</div><div class="metric-value '+(netBal2>=0?'blue':'red')+'">'+(netBal2>=0?'+':'')+fmt(netBal2)+'</div></div>'+
    '</div>':
    '<div class="metric-grid">'+
      '<div class="metric"><div class="metric-label">'+T.totalIncome+'</div><div class="metric-value green">+'+fmt(totalIng)+'</div></div>'+
      '<div class="metric"><div class="metric-label">'+T.totalExpenses+'</div><div class="metric-value red">-'+fmt(totalDesp)+'</div></div>'+
      '<div class="metric"><div class="metric-label">'+T.annualBalance+'</div><div class="metric-value '+(balance>=0?'blue':'red')+'">'+(balance>=0?'+':'')+fmt(balance)+'</div></div>'+
    '</div>')+
  '<div class="panel" style="margin-bottom:14px">'+
    '<div class="panel-title" style="margin-bottom:12px">'+T.monthlyChart+'</div>'+
    '<div class="bar-chart-outer"><div class="bar-chart-inner"><canvas id="barChart" role="img" aria-label="'+T.monthlyChart+'">'+T.monthlyChart+'</canvas></div></div>'+
  '</div>'+
  '<div class="two-col">'+
    '<div class="panel">'+
      '<div class="panel-title" style="margin-bottom:12px">'+T.annualSummary+'</div>'+
      (investEnabled?'<table><tr><th>Mes</th><th style="text-align:right">'+T.income+'</th><th style="text-align:right">'+T.expenses+'</th><th style="text-align:right">'+T.invested+'</th><th style="text-align:right">'+T.netBalance+'</th></tr>':'<table><tr><th>Mes</th><th style="text-align:right">'+T.income+'</th><th style="text-align:right">'+T.expenses+'</th><th style="text-align:right">'+T.balance+'</th></tr>')+
      rows+
      '<tr style="border-top:2px solid #f0f0f0"><td style="font-weight:600">'+T.total+'</td>'+
        '<td class="amount green">+'+fmt(totalIng)+'</td>'+
        '<td class="amount red">-'+fmt(totalDesp)+'</td>'+
        (investEnabled?
          '<td class="amount" style="color:#0f6e56">'+fmt(tInvNet)+'</td>'+
          '<td class="amount '+(netBal2>=0?'blue':'red')+'">'+(netBal2>=0?'+':'')+fmt(netBal2)+'</td>':
          '<td class="amount '+(balance>=0?'blue':'red')+'">'+(balance>=0?'+':'')+fmt(balance)+'</td>')+
        '</tr>'+
      '</table>'+
    '</div>'+
    '<div class="panel" style="display:flex;flex-direction:column;gap:14px">'+
      '<div><div class="panel-header"><div class="panel-title">'+T.distIncome+'</div>'+
      '<button class="detail-btn" onclick="showCatDetail(\'ing\',getMonthsForYear(activeYear))">'+T.viewDetail+'</button></div>'+
      '<div class="chart-wrap"><canvas id="pieIng" role="img" aria-label="'+T.distIncome+'">'+T.distIncome+'</canvas></div></div>'+
      '<div><div class="panel-header"><div class="panel-title">'+T.distExpenses+'</div>'+
      '<button class="detail-btn" onclick="showCatDetail(\'desp\',getMonthsForYear(activeYear))">'+T.viewDetail+'</button></div>'+
      '<div class="chart-wrap"><canvas id="pieDesp" role="img" aria-label="'+T.distExpenses+'">'+T.distExpenses+'</canvas></div></div>'+
    '</div>'+
  '</div>';
}

function makeRows(entries, type, sheet) {
  const isDesp=type==='desp';
  const colorMap=isDesp?CAT_COLORS:ING_COLORS;
  if(!entries.length)return '<tr><td colspan="4" style="color:#bbb;font-size:12px;padding:10px 8px">'+(isDesp?T.noExpenses:T.noIncome)+'</td></tr>';
  return entries.map((r,i)=>'<tr>'+
    '<td><span class="cat-pill" style="background:'+(colorMap[r.cat]||'#888')+'22;color:'+(colorMap[r.cat]||'#888')+'">'+r.cat+'</span></td>'+
    '<td class="amount '+(isDesp?'red':'green')+'">'+(isDesp?'-':'+')+fmt(r.amount)+'</td>'+
    '<td class="ref-col"><span class="ref-text">'+(r.ref||'')+'</span>'+(r.date?'<span class="ref-date">'+r.date+'</span>':'')+'</td>'+
    '<td><button class="del-btn" onclick="deleteEntry(\''+sheet+'\',\''+type+'\','+i+')">&#x2715;</button></td>'+
  '</tr>').join('');
}

function renderMonth(sheet) {
  const d=appData[sheet]||{ing:[],desp:[]};
  const totalIng=sum(d.ing);const totalDesp=sum(d.desp);const balance=totalIng-totalDesp;
  const ingCats=Object.keys(ING_COLORS).map(c=>'<option>'+c+'</option>').join('');
  const despCats=Object.keys(CAT_COLORS).map(c=>'<option>'+c+'</option>').join('');

  const invNet=investEnabled?(d.inv||[]).reduce((a,r)=>a+(r.opType==='sell'?-r.amount:r.amount),0):0;
  const netBal=balance-invNet;
  return '<div class="metric-grid">'+
      '<div class="metric"><div class="metric-label">'+T.income+'</div><div class="metric-value green">+'+fmt(totalIng)+'</div></div>'+
      '<div class="metric"><div class="metric-label">'+T.expenses+'</div><div class="metric-value red">-'+fmt(totalDesp)+'</div></div>'+
      (investEnabled?
        '<div class="metric"><div class="metric-label">'+T.invested+'</div><div class="metric-value" style="color:#0f6e56">'+fmt(invNet)+'</div></div>'+
        '<div class="metric"><div class="metric-label">'+T.netBalance+'</div><div class="metric-value '+(netBal>=0?'blue':'red')+'">'+(netBal>=0?'+':'')+fmt(netBal)+'</div></div>':
        '<div class="metric"><div class="metric-label">'+T.balance+'</div><div class="metric-value '+(balance>=0?'blue':'red')+'">'+(balance>=0?'+':'')+fmt(balance)+'</div></div>')+
    '</div>'+
  '<div class="two-col">'+
    '<div class="panel"><div class="panel-header"><div class="panel-title">'+T.distIncome+'</div>'+
    '<button class="detail-btn" onclick="showCatDetail(\'ing\',[\''+sheet+'\'])">'+T.viewDetail+'</button></div>'+
    (d.ing.length?'<div class="chart-wrap"><canvas id="pieMonthIng" role="img" aria-label="'+T.distIncome+'">'+T.distIncome+'</canvas></div>':'<p style="font-size:12px;color:#aaa;padding:8px 0">'+T.noData+'</p>')+
    '</div>'+
    '<div class="panel"><div class="panel-header"><div class="panel-title">'+T.distExpenses+'</div>'+
    '<button class="detail-btn" onclick="showCatDetail(\'desp\',[\''+sheet+'\'])">'+T.viewDetail+'</button></div>'+
    (d.desp.length?'<div class="chart-wrap"><canvas id="pieMonthDesp" role="img" aria-label="'+T.distExpenses+'">'+T.distExpenses+'</canvas></div>':'<p style="font-size:12px;color:#aaa;padding:8px 0">'+T.noData+'</p>')+
    '</div>'+
  '</div>'+
  '<div class="two-col" style="margin-top:0">'+
    '<div style="display:flex;flex-direction:column;gap:14px">'+
      '<div class="panel">'+
        '<div class="panel-title" style="margin-bottom:12px">'+T.income+'</div>'+
        '<table><tr><th>'+T.category+'</th><th style="text-align:right">'+T.amount+'</th><th>'+T.reference+'</th><th></th></tr>'+makeRows(d.ing,'ing',sheet)+'</table>'+
        '<div style="margin-top:10px"><button class="add-btn" onclick="toggleForm(\'ing-form\')">'+T.addEntry+'</button></div>'+
        '<div id="ing-form" class="hidden"><div class="form-row">'+
          '<select id="ing-cat">'+ingCats+'</select>'+
          '<input type="number" id="ing-amt" placeholder="'+T.amount+' €" step="0.01" min="0.01">'+
          '<input type="text" id="ing-ref" placeholder="'+T.reference+'">'+
          '<button class="save-btn" id="ing-save-btn" onclick="addEntry(\''+sheet+'\',\'ing\')">'+T.save+'</button>'+
          '<button class="cancel-btn" onclick="toggleForm(\'ing-form\')">&#x2715;</button>'+
        '</div></div>'+
      '</div>'+
      (investEnabled ? renderInvSection(sheet, d.inv||[]) : '')+
    '</div>'+
    '<div class="panel">'+
      '<div class="panel-title" style="margin-bottom:12px">'+T.expenses+'</div>'+
      '<table><tr><th>'+T.category+'</th><th style="text-align:right">'+T.amount+'</th><th>'+T.reference+'</th><th></th></tr>'+makeRows(d.desp,'desp',sheet)+'</table>'+
      '<div style="margin-top:10px"><button class="add-btn" onclick="toggleForm(\'desp-form\')">'+T.addEntry+'</button></div>'+
      '<div id="desp-form" class="hidden"><div class="form-row">'+
        '<select id="desp-cat">'+despCats+'</select>'+
        '<input type="number" id="desp-amt" placeholder="'+T.amount+' €" step="0.01" min="0.01">'+
        '<input type="text" id="desp-ref" placeholder="'+T.reference+'">'+
        '<button class="save-btn" id="desp-save-btn" onclick="addEntry(\''+sheet+'\',\'desp\')">'+T.save+'</button>'+
        '<button class="cancel-btn" onclick="toggleForm(\'desp-form\')">&#x2715;</button>'+
      '</div></div>'+
    '</div>'+
  '</div>';
}

function renderInvSection(sheet,inv){
  const cats=Object.keys(INV_COLORS);
  let rows='';
  if(inv.length){
    inv.forEach(function(r,i){
      const col=INV_COLORS[r.cat]||'#888';
      const isSell=r.opType==='sell';
      rows+='<tr>'+
        '<td><span class="cat-pill" style="background:'+col+'22;color:'+col+'">'+r.cat+'</span></td>'+
        '<td style="padding:7px 8px;vertical-align:middle"><span style="padding:2px 8px;border-radius:99px;font-size:11px;background:'+(isSell?'#f0fdf4':'#fff7ed')+';color:'+(isSell?'#16a34a':'#ea580c')+'">'+(isSell?T.sell:T.buy)+'</span></td>'+
        '<td class="amount" style="color:'+(isSell?'#16a34a':'#0f6e56')+'">'+(isSell?'+':'')+fmt(r.amount)+'</td>'+
        '<td class="ref-col"><span class="ref-text">'+(r.ref||'')+'</span>'+(r.date?'<span class="ref-date">'+r.date+'</span>':'')+'</td>'+
        '<td><button class="del-btn inv-del-btn" data-idx="'+i+'">&#x2715;</button></td>'+
      '</tr>';
    });
  } else {
    rows='<tr><td colspan="5" style="color:#bbb;font-size:12px;padding:10px 8px">'+T.noInv+'</td></tr>';
  }
  const net=inv.reduce(function(a,r){return a+(r.opType==='sell'?-r.amount:r.amount);},0);
  const tot=inv.length?'<tr style="border-top:2px solid #f0f0f0"><td colspan="2" style="font-weight:600">'+T.total+'</td><td class="amount" style="color:#0f6e56">'+fmt(net)+'</td><td colspan="2"></td></tr>':'';
  let catOpts='';
  cats.forEach(function(ct){catOpts+='<option>'+ct+'</option>';});
  return '<div class="panel" style="margin-top:14px">'+
    '<div class="panel-title" style="margin-bottom:12px">'+T.investments+'</div>'+
    '<table><tr><th>'+T.category+'</th><th></th><th style="text-align:right">'+T.amount+'</th><th>'+T.reference+'</th><th></th></tr>'+
    rows+tot+'</table>'+
    '<div style="margin-top:10px"><button class="add-btn" id="inv-add-btn">+ '+T.investments+'</button></div>'+
    '<div id="inv-form" class="hidden"><div class="form-row">'+
      '<select id="inv-cat">'+catOpts+'</select>'+
      '<select id="inv-op"><option value="buy">'+T.buy+'</option><option value="sell">'+T.sell+'</option></select>'+
      '<input type="number" id="inv-amt" placeholder="EUR" step="0.01" min="0.01">'+
      '<input type="text" id="inv-ref" placeholder="'+T.reference+'">'+
      '<button class="save-btn" id="inv-save-btn">'+T.save+'</button>'+
      '<button class="cancel-btn" id="inv-cancel-btn">&#x2715;</button>'+
    '</div></div></div>';
}

function bindInvButtons(sheet){
  var addBtn=document.getElementById('inv-add-btn');
  if(addBtn) addBtn.onclick=function(){toggleForm('inv-form');};
  var saveBtn=document.getElementById('inv-save-btn');
  if(saveBtn) saveBtn.onclick=function(){addInvestment(sheet);};
  var cancelBtn=document.getElementById('inv-cancel-btn');
  if(cancelBtn) cancelBtn.onclick=function(){toggleForm('inv-form');};
  document.querySelectorAll('.inv-del-btn').forEach(function(btn){
    btn.onclick=function(){deleteInvestment(sheet,parseInt(this.getAttribute('data-idx')));};
  });
}


function initBarChart() {
  const el=document.getElementById('barChart');if(!el)return;
  const active=getMonthsForYear(activeYear).filter(m=>sum(appData[m]&&appData[m].ing)>0||sum(appData[m]&&appData[m].desp)>0);
  // On mobile: show 4 months visible, rest scrollable
  // Each month group = container_width/4, total = numMonths * that
  const isMobile = window.innerWidth <= 700;
  if (isMobile && active.length > 0) {
    const containerW = document.querySelector('.bar-chart-outer').offsetWidth || window.innerWidth;
    const perBar = Math.floor(containerW / 4); // 4 bars visible
    el.parentElement.style.minWidth = (active.length * perBar) + 'px';
  } else {
    el.parentElement.style.minWidth = '';
  }
  const activeMonths = getMonthsForYear(activeYear);
  const invDataset = investEnabled ? [{
    label:T.investments,
    data:active.map(m=>{
      const inv=(appData[m]?.inv||[]).reduce((a,r)=>a+(r.opType==='sell'?-r.amount:r.amount),0);
      return +inv.toFixed(2);
    }),
    backgroundColor:'#0f6e5655',borderColor:'#0f6e56',borderWidth:1.5
  }] : [];
  charts['bar']=new Chart(el,{
    type:'bar',
    data:{labels:active.map(m=>T.months[activeMonths.indexOf(m)]),datasets:[
      {label:T.income,data:active.map(m=>+sum(appData[m]&&appData[m].ing).toFixed(2)),backgroundColor:'#16a34a55',borderColor:'#16a34a',borderWidth:1.5},
      {label:T.expenses,data:active.map(m=>+sum(appData[m]&&appData[m].desp).toFixed(2)),backgroundColor:'#dc262655',borderColor:'#dc2626',borderWidth:1.5},
      ...invDataset
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:12},color:'#666'}}},
      scales:{x:{ticks:{autoSkip:false,color:'#888',font:{size:11}}},y:{ticks:{color:'#888',font:{size:11},callback:v=>v+'€'}}}
    }
  });
}

function initPieChart(id,catData,colorMap) {
  const el=document.getElementById(id);if(!el||!catData.length)return;
  const top=catData.slice(0,10);
  charts[id]=new Chart(el,{
    type:'doughnut',
    data:{labels:top.map(x=>x[0]),datasets:[{data:top.map(x=>+x[1].toFixed(2)),backgroundColor:top.map(x=>colorMap[x[0]]||'#888'),borderWidth:1.5,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11},color:'#666',boxWidth:12,padding:8}}}}
  });
}

function showToast(msg,isError) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className=isError?'show error':'show';
  setTimeout(()=>{t.className='';},3000);
}
</script>
</body>
