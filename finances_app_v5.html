<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finances Personals 2026</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; }

#config-banner { background: #fff3cd; border-bottom: 1px solid #ffc107; padding: 10px 20px; font-size: 13px; color: #856404; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
#config-banner input { flex: 1; min-width: 200px; padding: 6px 10px; border: 1px solid #ffc107; border-radius: 6px; font-size: 13px; background: white; }
#config-banner button { background: #ffc107; border: none; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; color: #1a1a1a; white-space: nowrap; }
#config-banner.hidden { display: none; }

header { background: white; border-bottom: 1px solid #e5e5e5; padding: 0 20px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; padding: 14px 0 0; }
h1 { font-size: 18px; font-weight: 600; }
.sync-btn { background: none; border: 1px solid #e5e5e5; padding: 6px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #666; }
.sync-btn:hover { background: #f5f5f5; }
.sync-btn:disabled { opacity: 0.5; pointer-events: none; }

.tabs { display: flex; gap: 2px; overflow-x: auto; padding: 8px 0 0; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 8px 16px; font-size: 13px; cursor: pointer; border: none; background: none; color: #666; border-bottom: 2px solid transparent; margin-bottom: -1px; white-space: nowrap; transition: all 0.15s; }
.tab:hover { color: #1a1a1a; }
.tab.active { color: #1a1a1a; border-bottom-color: #2563eb; font-weight: 500; }

main { max-width: 960px; margin: 0 auto; padding: 20px 16px; }

#loader { text-align: center; padding: 60px 20px; color: #888; }
.spinner { width: 32px; height: 32px; border: 3px solid #e5e5e5; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }

/* METRIC CARDS — € inline, no overflow */
.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
.metric { background: white; border-radius: 10px; padding: 14px 12px; border: 1px solid #e5e5e5; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 6px; }
.metric-value { font-size: 18px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
@media (max-width: 400px) { .metric-value { font-size: 15px; } }
.green { color: #16a34a; }
.red { color: #dc2626; }
.blue { color: #2563eb; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 14px; }
@media (max-width: 700px) {
  .two-col { grid-template-columns: 1fr; }
  .metric-grid { gap: 8px; }
}
.panel { background: white; border-radius: 10px; border: 1px solid #e5e5e5; padding: 16px; }
.panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.panel-title { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.06em; }

/* TABLE */
table { width: 100%; font-size: 13px; border-collapse: collapse; }
th { text-align: left; color: #888; font-weight: 400; padding: 6px 8px; border-bottom: 1px solid #f0f0f0; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; }
td { padding: 7px 8px; border-bottom: 1px solid #f5f5f5; vertical-align: top; }
tr:last-child td { border-bottom: none; }
td.amount { text-align: right; font-weight: 600; font-size: 13px; white-space: nowrap; vertical-align: middle; }
td.ref-col { color: #1a1a1a; font-size: 12px; max-width: 160px; }
.ref-text { display: block; color: #1a1a1a; }
.ref-date { display: block; font-size: 11px; color: #bbb; margin-top: 2px; }
.ref-expand { display: none; background: none; border: none; color: #aaa; font-size: 11px; cursor: pointer; padding: 0; margin-top: 2px; text-decoration: underline; }
.ref-full { display: none; font-size: 12px; color: #666; margin-top: 4px; line-height: 1.4; }

.cat-pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 500; vertical-align: middle; }
.del-btn { background: none; border: none; color: #ddd; cursor: pointer; font-size: 13px; padding: 0 4px; transition: color 0.1s; }
tr:hover .del-btn { color: #bbb; }
.del-btn:hover { color: #dc2626 !important; }

.add-btn { background: none; border: 1px solid #e5e5e5; padding: 6px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #444; }
.add-btn:hover { background: #f9f9f9; }
.detail-btn { background: none; border: 1px solid #e5e5e5; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #666; white-space: nowrap; }
.detail-btn:hover { background: #f5f5f5; }

.form-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; padding-top: 12px; border-top: 1px solid #f0f0f0; }
.form-row select, .form-row input { flex: 1; min-width: 90px; font-size: 13px; padding: 7px 10px; border: 1px solid #e0e0e0; border-radius: 8px; background: white; color: #1a1a1a; }
.save-btn { background: #2563eb; color: white; border: none; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500; white-space: nowrap; }
.save-btn:hover { background: #1d4ed8; }
.save-btn:disabled { opacity: 0.5; pointer-events: none; }
.cancel-btn { background: none; border: 1px solid #e0e0e0; color: #888; padding: 7px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; }
.hidden { display: none; }

/* CHART */
.chart-wrap { position: relative; width: 100%; height: 210px; }
.chart-wrap-lg { position: relative; width: 100%; height: 250px; }
/* Scrollable bar chart on mobile */
.bar-chart-outer { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.bar-chart-inner { height: 250px; }
@media (max-width: 700px) { .bar-chart-inner { min-width: 600px; } }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 16px; }
.modal-overlay.hidden { display: none; }
.modal { background: white; border-radius: 14px; width: 100%; max-width: 440px; max-height: 85vh; display: flex; flex-direction: column; }
.modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #f0f0f0; flex-shrink: 0; border-radius: 14px 14px 0 0; }
.modal-header h3 { font-size: 15px; font-weight: 600; }
.modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #888; padding: 2px 6px; border-radius: 6px; line-height: 1; }
.modal-close:hover { background: #f5f5f5; color: #1a1a1a; }
.modal-body { padding: 8px 20px 20px; overflow-y: auto; flex: 1; }
.modal-back { background: none; border: none; color: #2563eb; font-size: 13px; cursor: pointer; padding: 8px 0 4px; display: flex; align-items: center; gap: 4px; }
.modal-back:hover { opacity: 0.8; }

.cat-detail-row { display: flex; align-items: center; gap: 10px; padding: 11px 0; border-bottom: 1px solid #f5f5f5; cursor: pointer; transition: background 0.1s; border-radius: 6px; }
.cat-detail-row:hover { background: #f9f9f9; }
.cat-detail-row:last-of-type { border-bottom: none; }
.cat-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.cat-detail-name { flex: 1; font-size: 13px; }
.cat-detail-meta { font-size: 11px; color: #aaa; margin-right: 4px; white-space: nowrap; }
.cat-detail-amount { font-size: 14px; font-weight: 600; white-space: nowrap; }
.cat-detail-arrow { color: #ccc; font-size: 13px; flex-shrink: 0; }
.modal-total { display: flex; justify-content: space-between; padding: 12px 0 4px; border-top: 1px solid #e5e5e5; margin-top: 4px; font-weight: 600; font-size: 14px; }

/* Individual payments in modal */
.payment-row { padding: 10px 0; border-bottom: 1px solid #f5f5f5; }
.payment-row:last-child { border-bottom: none; }
.payment-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.payment-ref { font-size: 13px; color: #1a1a1a; flex: 1; }
.payment-amount { font-size: 14px; font-weight: 600; white-space: nowrap; }
.payment-date { font-size: 11px; color: #bbb; margin-top: 3px; }

#toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a1a; color: white; padding: 10px 18px; border-radius: 10px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.2s; pointer-events: none; max-width: 280px; }
#toast.show { opacity: 1; }
#toast.error { background: #dc2626; }
</style>
</head>
<body>

<div id="config-banner">
  <span>Enganxa la URL del teu Apps Script:</span>
  <input type="text" id="script-url-input" placeholder="https://script.google.com/macros/s/XXXX/exec">
  <button onclick="saveScriptUrl()">Connectar</button>
</div>

<header>
  <div class="header-top">
    <h1>Finances Personals 2026</h1>
    <button class="sync-btn" id="sync-btn" onclick="loadData()">Sincronitzar</button>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<main id="main">
  <div id="loader">
    <div class="spinner"></div>
    <p>Connectant amb Google Sheets...</p>
  </div>
</main>

<div id="toast"></div>

<div class="modal-overlay hidden" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title">Detall per categoria</h3>
      <button class="modal-close" onclick="closeModalDirect()">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const CAT_COLORS = {
  'Supermercat':'#3266ad','Restaurant':'#e07b39','Alcohol':'#c0392b',
  'Transport':'#8e44ad','Salut i esport':'#27ae60','Roba o accesoris':'#e91e8c',
  'Gastos fixes':'#16a085','Farmàcia':'#2980b9','Allotjament':'#f39c12',
  'Entrades':'#9b59b6','Impostos':'#7f8c8d','Formació':'#1abc9c',
  'Perruqueria':'#e74c3c','Tabac':'#95a5a6','Altres':'#bdc3c7'
};
const ING_COLORS = {
  'Worldpackers':'#1D9E75','Familia':'#185FA5','Atur':'#BA7517',
  'UGC':'#8e44ad','YouTube':'#c0392b','Altres':'#888'
};
const ALL_MONTHS = ['Gen2026','Feb2026','Març2026','Abril2026','Maig2026','Juny2026',
                    'Jul2026','Ago2026','Set2026','Oct2026','Nov2026','Des2026'];
const ALL_LABELS = {
  'Gen2026':'Gener','Feb2026':'Febrer','Març2026':'Març','Abril2026':'Abril',
  'Maig2026':'Maig','Juny2026':'Juny','Jul2026':'Juliol','Ago2026':'Agost',
  'Set2026':'Setembre','Oct2026':'Octubre','Nov2026':'Novembre','Des2026':'Desembre',
  'Resum2026':'Resum'
};

let appData = {};
let activeTab = 'Resum2026';
let charts = {};
let SCRIPT_URL = localStorage.getItem('financeScriptUrl') || '';
let modalState = null; // tracks current modal context

function fmt(n) { return n.toFixed(2) + '€'; }
function fmtSign(n, isDesp) { return (isDesp ? '-' : '+') + fmt(n); }
function sum(arr) { return (arr || []).reduce((a,b) => a + b.amount, 0); }
function getByCat(arr) {
  const m = {};
  (arr||[]).forEach(r => { m[r.cat]=(m[r.cat]||0)+r.amount; });
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function getCountByCat(arr) {
  const m = {};
  (arr||[]).forEach(r => {
    if (!m[r.cat]) m[r.cat]={total:0,count:0,items:[]};
    m[r.cat].total += r.amount; m[r.cat].count++; m[r.cat].items.push(r);
  });
  return Object.entries(m).sort((a,b)=>b[1].total-a[1].total);
}
function collectAllForType(months, type) {
  const all = [];
  months.forEach(m => (appData[m]&&appData[m][type]||[]).forEach(r => all.push(r)));
  return all;
}
function destroyCharts() { Object.values(charts).forEach(c=>c.destroy()); charts={}; }
function toggleForm(id) { document.getElementById(id).classList.toggle('hidden'); }
function todayStr() {
  const d = new Date();
  return d.getDate().toString().padStart(2,'0') + '/' + (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getFullYear();
}

window.onload = () => {
  buildTabs();
  if (SCRIPT_URL) {
    document.getElementById('config-banner').classList.add('hidden');
    document.getElementById('script-url-input').value = SCRIPT_URL;
    loadData();
  } else {
    document.getElementById('loader').innerHTML = '<p style="color:#888;font-size:14px">Configura la URL d\'Apps Script per començar.</p>';
  }
};

function saveScriptUrl() {
  const url = document.getElementById('script-url-input').value.trim();
  if (!url.startsWith('https://script.google.com')) { showToast('URL no vàlida', true); return; }
  SCRIPT_URL = url;
  localStorage.setItem('financeScriptUrl', url);
  document.getElementById('config-banner').classList.add('hidden');
  loadData();
}

function buildTabs() {
  const container = document.getElementById('tabs');
  container.innerHTML = ['Resum2026',...ALL_MONTHS].map(t =>
    '<button class="tab'+(t===activeTab?' active':'')+'" onclick="setTab(\''+t+'\')">'+ALL_LABELS[t]+'</button>'
  ).join('');
}

function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(t =>
    t.classList.toggle('active', t.textContent === ALL_LABELS[tab])
  );
  render();
}

async function api(params) {
  const url = SCRIPT_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

async function loadData() {
  if (!SCRIPT_URL) return;
  const btn = document.getElementById('sync-btn');
  btn.disabled = true; btn.textContent = 'Carregant...';
  try {
    const json = await api({action:'getData'});
    appData = json;
    ALL_MONTHS.forEach(m => { if (!appData[m]) appData[m]={ing:[],desp:[]}; });
    render();
    showToast('Dades sincronitzades');
  } catch(err) {
    showToast('Error: '+err.message, true);
    if (Object.keys(appData).length===0) {
      ALL_MONTHS.forEach(m => { appData[m]={ing:[],desp:[]}; });
      render();
    }
  } finally {
    btn.disabled=false; btn.textContent='Sincronitzar';
  }
}

async function addEntry(sheet, type) {
  const cat = document.getElementById(type+'-cat').value;
  const amt = parseFloat(document.getElementById(type+'-amt').value);
  const ref = document.getElementById(type+'-ref').value;
  const btn = document.getElementById(type+'-save-btn');
  if (!amt||isNaN(amt)||amt<=0) { showToast('Import no vàlid', true); return; }
  btn.disabled=true; btn.textContent='Guardant...';
  const date = todayStr();
  try {
    await api({action:'addEntry', sheet, type, cat, amount:amt, ref, date});
    appData[sheet][type].push({cat, amount:amt, ref, date});
    document.getElementById(type+'-amt').value='';
    document.getElementById(type+'-ref').value='';
    render();
    showToast('Afegit correctament');
  } catch(err) {
    showToast('Error guardant: '+err.message, true);
  } finally {
    btn.disabled=false; btn.textContent='Guardar';
  }
}

async function deleteEntry(sheet, type, idx) {
  if (!confirm('Eliminar aquest registre?')) return;
  try {
    await api({action:'deleteEntry', sheet, type, index:idx});
    appData[sheet][type].splice(idx,1);
    render();
    showToast('Eliminat');
  } catch(err) {
    showToast('Error: '+err.message, true);
  }
}

// ---- MODAL ----
function showCatDetail(type, months) {
  modalState = {type, months};
  const isDesp = type==='desp';
  const colorMap = isDesp ? CAT_COLORS : ING_COLORS;
  const allEntries = collectAllForType(months, type);
  const cats = getCountByCat(allEntries);
  const grandTotal = cats.reduce((s,e)=>s+e[1].total, 0);

  let rows = '';
  cats.forEach(entry => {
    const cat=entry[0]; const v=entry[1];
    const color=colorMap[cat]||'#888';
    const pct=grandTotal>0?(v.total/grandTotal*100).toFixed(1):0;
    rows += '<div class="cat-detail-row" onclick="showCatPayments(\''+cat+'\')">'+
      '<div class="cat-dot" style="background:'+color+'"></div>'+
      '<div class="cat-detail-name">'+cat+'</div>'+
      '<div class="cat-detail-meta">'+v.count+' reg. &middot; '+pct+'%</div>'+
      '<div class="cat-detail-amount" style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(v.total,isDesp)+'</div>'+
      '<div class="cat-detail-arrow">&#8250;</div>'+
    '</div>';
  });

  const totalRow = rows ? '<div class="modal-total"><span>Total</span><span style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(grandTotal,isDesp)+'</span></div>' : '';

  document.getElementById('modal-title').textContent = isDesp ? 'Despesses per categoria' : 'Ingressos per categoria';
  document.getElementById('modal-body').innerHTML = rows ? rows+totalRow : '<p style="color:#aaa;font-size:13px;padding:8px 0">Sense dades</p>';
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function showCatPayments(cat) {
  if (!modalState) return;
  const {type, months} = modalState;
  const isDesp = type==='desp';
  const colorMap = isDesp ? CAT_COLORS : ING_COLORS;
  const color = colorMap[cat]||'#888';
  const allEntries = collectAllForType(months, type).filter(r=>r.cat===cat);
  const total = sum(allEntries);

  let rows = '';
  allEntries.forEach(r => {
    rows += '<div class="payment-row">'+
      '<div class="payment-top">'+
        '<div class="payment-ref">'+r.ref+'</div>'+
        '<div class="payment-amount" style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(r.amount,isDesp)+'</div>'+
      '</div>'+
      (r.date ? '<div class="payment-date">'+r.date+'</div>' : '')+
    '</div>';
  });

  const totalRow = '<div class="modal-total"><span>Total '+cat+'</span><span style="color:'+(isDesp?'#dc2626':'#16a34a')+'">'+fmtSign(total,isDesp)+'</span></div>';

  document.getElementById('modal-title').innerHTML =
    '<span style="display:inline-flex;align-items:center;gap:8px">'+
    '<span style="width:10px;height:10px;border-radius:50%;background:'+color+';display:inline-block;flex-shrink:0"></span>'+
    cat+'</span>';

  document.getElementById('modal-body').innerHTML =
    '<button class="modal-back" onclick="showCatDetail(\''+type+'\', modalState.months)">&#8592; Tornar a categories</button>'+
    (rows ? rows+totalRow : '<p style="color:#aaa;font-size:13px;padding:8px 0">Sense pagaments</p>');
}

function closeModal(e) { if (e.target===document.getElementById('modal-overlay')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal-overlay').classList.add('hidden'); modalState=null; }

// ---- RENDER ----
function render() {
  destroyCharts();
  document.getElementById('main').innerHTML = activeTab==='Resum2026' ? renderResume() : renderMonth(activeTab);
  requestAnimationFrame(() => {
    if (activeTab==='Resum2026') {
      initBarChart();
      initPieChart('pieDesp', getByCat(collectAllForType(ALL_MONTHS,'desp')), CAT_COLORS);
      initPieChart('pieIng', getByCat(collectAllForType(ALL_MONTHS,'ing')), ING_COLORS);
    } else {
      const d = appData[activeTab]||{ing:[],desp:[]};
      if (d.desp.length) initPieChart('pieMonthDesp', getByCat(d.desp), CAT_COLORS);
      if (d.ing.length) initPieChart('pieMonthIng', getByCat(d.ing), ING_COLORS);
    }
  });
}

function renderResume() {
  const md = ALL_MONTHS.map(m=>({label:ALL_LABELS[m], ing:sum(appData[m]&&appData[m].ing), desp:sum(appData[m]&&appData[m].desp)}));
  const totalIng = md.reduce((a,b)=>a+b.ing,0);
  const totalDesp = md.reduce((a,b)=>a+b.desp,0);
  const balance = totalIng-totalDesp;

  const rows = md.filter(m=>m.ing>0||m.desp>0).map(m=>{
    const bal=m.ing-m.desp;
    return '<tr><td style="font-weight:500">'+m.label+'</td>'+
      '<td class="amount green">+'+fmt(m.ing)+'</td>'+
      '<td class="amount red">-'+fmt(m.desp)+'</td>'+
      '<td class="amount '+(bal>=0?'blue':'red')+'">'+(bal>=0?'+':'')+fmt(bal)+'</td></tr>';
  }).join('');

  return '<div class="metric-grid">'+
    '<div class="metric"><div class="metric-label">Total ingressos</div><div class="metric-value green">+'+fmt(totalIng)+'</div></div>'+
    '<div class="metric"><div class="metric-label">Total despesses</div><div class="metric-value red">-'+fmt(totalDesp)+'</div></div>'+
    '<div class="metric"><div class="metric-label">Balanç anual</div><div class="metric-value '+(balance>=0?'blue':'red')+'">'+(balance>=0?'+':'')+fmt(balance)+'</div></div>'+
  '</div>'+

  '<div class="panel" style="margin-bottom:14px">'+
    '<div class="panel-title" style="margin-bottom:12px">Ingressos i despesses per mes</div>'+
    '<div class="bar-chart-outer"><div class="bar-chart-inner"><canvas id="barChart" role="img" aria-label="Gràfic barres ingressos i despesses per mes">Ingressos i despesses mensuals</canvas></div></div>'+
  '</div>'+

  '<div class="two-col">'+
    '<div class="panel">'+
      '<div class="panel-title" style="margin-bottom:12px">Resum anual</div>'+
      '<table>'+
        '<tr><th>Mes</th><th style="text-align:right">Ingressos</th><th style="text-align:right">Despesses</th><th style="text-align:right">Balanç</th></tr>'+
        rows+
        '<tr style="border-top:2px solid #f0f0f0"><td style="font-weight:600">Total</td>'+
          '<td class="amount green">+'+fmt(totalIng)+'</td>'+
          '<td class="amount red">-'+fmt(totalDesp)+'</td>'+
          '<td class="amount '+(balance>=0?'blue':'red')+'">'+(balance>=0?'+':'')+fmt(balance)+'</td></tr>'+
      '</table>'+
    '</div>'+
    '<div class="panel" style="display:flex;flex-direction:column;gap:14px">'+
      '<div>'+
        '<div class="panel-header">'+
          '<div class="panel-title">Distribució ingressos</div>'+
          '<button class="detail-btn" onclick="showCatDetail(\'ing\', ALL_MONTHS)">Veure detall</button>'+
        '</div>'+
        '<div class="chart-wrap"><canvas id="pieIng" role="img" aria-label="Distribució ingressos per categoria">Distribució ingressos</canvas></div>'+
      '</div>'+
      '<div>'+
        '<div class="panel-header">'+
          '<div class="panel-title">Distribució despesses</div>'+
          '<button class="detail-btn" onclick="showCatDetail(\'desp\', ALL_MONTHS)">Veure detall</button>'+
        '</div>'+
        '<div class="chart-wrap"><canvas id="pieDesp" role="img" aria-label="Distribució despesses per categoria">Distribució despesses</canvas></div>'+
      '</div>'+
    '</div>'+
  '</div>';
}

function makeRows(entries, type, sheet) {
  const isDesp = type==='desp';
  const colorMap = isDesp ? CAT_COLORS : ING_COLORS;
  if (!entries.length) return '<tr><td colspan="4" style="color:#bbb;font-size:12px;padding:10px 8px">Sense '+(isDesp?'despesses':'ingressos')+'</td></tr>';
  return entries.map((r,i) => {
    const refShort = r.ref && r.ref.length > 30 ? r.ref.substring(0,30)+'...' : r.ref;
    const hasLong = r.ref && r.ref.length > 30;
    return '<tr>'+
      '<td><span class="cat-pill" style="background:'+(colorMap[r.cat]||'#888')+'22;color:'+(colorMap[r.cat]||'#888')+'">'+r.cat+'</span></td>'+
      '<td class="amount '+(isDesp?'red':'green')+'">'+(isDesp?'-':'+')+fmt(r.amount)+'</td>'+
      '<td class="ref-col">'+
        '<span class="ref-text">'+(r.ref||'')+'</span>'+
        (r.date?'<span class="ref-date">'+r.date+'</span>':'')+
      '</td>'+
      '<td><button class="del-btn" onclick="deleteEntry(\''+sheet+'\',\''+type+'\','+i+')">&#x2715;</button></td>'+
    '</tr>';
  }).join('');
}

function renderMonth(sheet) {
  const d = appData[sheet]||{ing:[],desp:[]};
  const totalIng=sum(d.ing); const totalDesp=sum(d.desp); const balance=totalIng-totalDesp;
  const ingCats = Object.keys(ING_COLORS).map(c=>'<option>'+c+'</option>').join('');
  const despCats = Object.keys(CAT_COLORS).map(c=>'<option>'+c+'</option>').join('');

  return '<div class="metric-grid">'+
    '<div class="metric"><div class="metric-label">Ingressos</div><div class="metric-value green">+'+fmt(totalIng)+'</div></div>'+
    '<div class="metric"><div class="metric-label">Despesses</div><div class="metric-value red">-'+fmt(totalDesp)+'</div></div>'+
    '<div class="metric"><div class="metric-label">Balanç</div><div class="metric-value '+(balance>=0?'blue':'red')+'">'+(balance>=0?'+':'')+fmt(balance)+'</div></div>'+
  '</div>'+

  '<div class="two-col">'+
    '<div class="panel">'+
      '<div class="panel-header">'+
        '<div class="panel-title">Distribució ingressos</div>'+
        '<button class="detail-btn" onclick="showCatDetail(\'ing\',[\''+sheet+'\'])">Veure detall</button>'+
      '</div>'+
      (d.ing.length?'<div class="chart-wrap"><canvas id="pieMonthIng" role="img" aria-label="Distribució ingressos del mes">Distribució ingressos</canvas></div>':'<p style="font-size:12px;color:#aaa;padding:8px 0">Sense dades</p>')+
    '</div>'+
    '<div class="panel">'+
      '<div class="panel-header">'+
        '<div class="panel-title">Distribució despesses</div>'+
        '<button class="detail-btn" onclick="showCatDetail(\'desp\',[\''+sheet+'\'])">Veure detall</button>'+
      '</div>'+
      (d.desp.length?'<div class="chart-wrap"><canvas id="pieMonthDesp" role="img" aria-label="Distribució despesses del mes">Distribució despesses</canvas></div>':'<p style="font-size:12px;color:#aaa;padding:8px 0">Sense dades</p>')+
    '</div>'+
  '</div>'+

  '<div class="two-col" style="margin-top:0">'+
    '<div class="panel">'+
      '<div class="panel-title" style="margin-bottom:12px">Ingressos</div>'+
      '<table><tr><th>Categoria</th><th style="text-align:right">Import</th><th>Referència</th><th></th></tr>'+makeRows(d.ing,'ing',sheet)+'</table>'+
      '<div style="margin-top:10px"><button class="add-btn" onclick="toggleForm(\'ing-form\')">+ Afegir</button></div>'+
      '<div id="ing-form" class="hidden"><div class="form-row">'+
        '<select id="ing-cat">'+ingCats+'</select>'+
        '<input type="number" id="ing-amt" placeholder="Import €" step="0.01" min="0.01">'+
        '<input type="text" id="ing-ref" placeholder="Referència">'+
        '<button class="save-btn" id="ing-save-btn" onclick="addEntry(\''+sheet+'\',\'ing\')">Guardar</button>'+
        '<button class="cancel-btn" onclick="toggleForm(\'ing-form\')">&#x2715;</button>'+
      '</div></div>'+
    '</div>'+
    '<div class="panel">'+
      '<div class="panel-title" style="margin-bottom:12px">Despesses</div>'+
      '<table><tr><th>Categoria</th><th style="text-align:right">Import</th><th>Referència</th><th></th></tr>'+makeRows(d.desp,'desp',sheet)+'</table>'+
      '<div style="margin-top:10px"><button class="add-btn" onclick="toggleForm(\'desp-form\')">+ Afegir</button></div>'+
      '<div id="desp-form" class="hidden"><div class="form-row">'+
        '<select id="desp-cat">'+despCats+'</select>'+
        '<input type="number" id="desp-amt" placeholder="Import €" step="0.01" min="0.01">'+
        '<input type="text" id="desp-ref" placeholder="Referència">'+
        '<button class="save-btn" id="desp-save-btn" onclick="addEntry(\''+sheet+'\',\'desp\')">Guardar</button>'+
        '<button class="cancel-btn" onclick="toggleForm(\'desp-form\')">&#x2715;</button>'+
      '</div></div>'+
    '</div>'+
  '</div>';
}

function initBarChart() {
  const el = document.getElementById('barChart');
  if (!el) return;
  const active = ALL_MONTHS.filter(m=>sum(appData[m]&&appData[m].ing)>0||sum(appData[m]&&appData[m].desp)>0);
  charts['bar'] = new Chart(el, {
    type: 'bar',
    data: {
      labels: active.map(m=>ALL_LABELS[m]),
      datasets: [
        {label:'Ingressos', data:active.map(m=>+sum(appData[m]&&appData[m].ing).toFixed(2)), backgroundColor:'#16a34a55', borderColor:'#16a34a', borderWidth:1.5},
        {label:'Despesses', data:active.map(m=>+sum(appData[m]&&appData[m].desp).toFixed(2)), backgroundColor:'#dc262655', borderColor:'#dc2626', borderWidth:1.5}
      ]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{labels:{font:{size:12},color:'#666'}}},
      scales:{
        x:{ticks:{autoSkip:false,color:'#888',font:{size:11}}},
        y:{ticks:{color:'#888',font:{size:11},callback:v=>v+'€'}}
      }
    }
  });
}

function initPieChart(id, catData, colorMap) {
  const el = document.getElementById(id);
  if (!el||!catData.length) return;
  const top = catData.slice(0,10);
  charts[id] = new Chart(el, {
    type:'doughnut',
    data:{
      labels:top.map(x=>x[0]),
      datasets:[{data:top.map(x=>+x[1].toFixed(2)), backgroundColor:top.map(x=>colorMap[x[0]]||'#888'), borderWidth:1.5, borderColor:'#fff'}]
    },
    options:{responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom',labels:{font:{size:11},color:'#666',boxWidth:12,padding:8}}}}
  });
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'show error' : 'show';
  setTimeout(()=>{ t.className=''; }, 3000);
}
</script>
</body>
</html>
